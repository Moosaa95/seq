# HTTP — ACME challenge passthrough, everything else → HTTPS
server {
    listen 80;
    server_name back.seqprojects.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Backend API — HTTPS
server {
    listen 443 ssl;
    server_name back.seqprojects.com;

    ssl_certificate     /etc/letsencrypt/live/back.seqprojects.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/back.seqprojects.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        add_header 'Access-Control-Allow-Origin'      $http_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true'       always;
        add_header 'Access-Control-Allow-Methods'     'GET, POST, PATCH, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept' always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }
}
